<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clucking&hellip;</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="popup-body chicken-page">
  <div class="egg-bg" aria-hidden="true">
    <span class="egg" style="left: 6%;  top: 18%; animation-delay: 0s;">🥚</span>
    <span class="egg" style="left: 88%; top: 28%; animation-delay: 0.4s;">🥚</span>
    <span class="egg" style="left: 14%; top: 78%; animation-delay: 0.8s;">🐣</span>
    <span class="egg" style="left: 82%; top: 70%; animation-delay: 1.2s;">🥚</span>
    <span class="egg" style="left: 50%; top: 88%; animation-delay: 1.6s;">🐣</span>
  </div>

  <main>
    <h2 style="margin: 0 0 8px; color: var(--linkedin-blue); font-size: 28px;">🐔 Clucking&hellip;</h2>
    <p>Our chicken is pecking at your LinkedIn post. This usually takes 1&ndash;3 seconds.</p>
    <p style="color: var(--text-muted); font-size: 13px; margin-top: 18px;">Move your mouse around &mdash; the chicken follows.</p>
    <p style="color: var(--text-muted); font-size: 13px;">If this page never updates, open the linkedin.com tab's DevTools (F12) &rarr; Console and look for <code>[LinkedInTranslator]</code> log lines.</p>
  </main>

  <script src="chicken.js"></script>
  <script>startChicken();</script>
</body>
</html>
