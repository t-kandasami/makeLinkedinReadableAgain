services:
  translator:
    build: ./backend
    container_name: linkedin-translator
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      STATIC_DIR: /docs
    volumes:
      - ./backend:/app
      - ./docs:/docs
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
